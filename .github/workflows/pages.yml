name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Quyền tối thiểu để deploy lên GitHub Pages (theo guide chính thức).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # cần full history cho git-revision-date-localized nếu thêm sau

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mkdocs-material
        run: |
          pip install \
            mkdocs-material==9.5.* \
            pymdown-extensions==10.* \
            'mkdocs-material[imaging]==9.5.*' || \
            pip install mkdocs-material==9.5.* pymdown-extensions==10.*

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
