# Bát Trạch — 8 hướng cho mỗi cung mệnh.
# Nguồn: Bát Trạch Minh Cảnh (八宅明鏡), Cố Cảnh Hiên, đời Thanh.
#
# Schema:
#   <cung>:
#     chinh_vi: <hướng>       # hướng chính/phục vị của cung
#     huong_tot:
#       Sinh Khí: <hướng>     # tài lộc, công danh, sinh khí
#       Thiên Y:  <hướng>     # sức khỏe, trường thọ
#       Diên Niên: <hướng>    # tình duyên, hòa thuận, sống lâu
#       Phục Vị:  <hướng>     # bình ổn, học hành, công danh nhỏ
#     huong_xau:
#       Tuyệt Mệnh: <hướng>   # nặng nhất — tổn mạng
#       Ngũ Quỷ:    <hướng>   # mất mát tiền của, kiện tụng
#       Lục Sát:    <hướng>   # tranh cãi, thị phi
#       Họa Hại:    <hướng>   # ốm đau, kiện cáo nhẹ
#
# 8 hướng dùng tên tắt VN: Bắc, Nam, Đông, Tây, Đông Bắc, Đông Nam, Tây Bắc, Tây Nam.

version: "1.0.0"
source: "Bát Trạch Minh Cảnh — Cố Cảnh Hiên, đời Thanh"

