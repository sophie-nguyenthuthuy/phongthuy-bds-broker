name: phongthuy-bds

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phongthuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phongthuy_dev}
      POSTGRES_DB: ${POSTGRES_DB:-phongthuy_bds}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phongthuy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-phongthuy}:${POSTGRES_PASSWORD:-phongthuy_dev}@postgres:5432/${POSTGRES_DB:-phongthuy_bds}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    command: >
      sh -c "alembic upgrade head &&
             uvicorn phongthuy_bds.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
